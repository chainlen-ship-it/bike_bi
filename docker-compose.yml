services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    command:
      [
        "sh",
        "-c",
        "cp -an /usr/share/nginx/backend-data-seed/. /usr/share/nginx/backend-data/ 2>/dev/null || true; nginx -g 'daemon off;'",
      ]
    volumes:
      - backend-data:/usr/share/nginx/backend-data
    depends_on:
      - backend-api

  backend-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    command:
      [
        "sh",
        "-c",
        "cp -an /workspace/backend-data-seed/. /workspace/backend/data/ 2>/dev/null || true; uvicorn backend.app.api.server:app --host 0.0.0.0 --port 8000",
      ]
    volumes:
      - backend-data:/workspace/backend/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    profiles:
      - extract
    env_file:
      - .env
    command:
      [
        "sh",
        "-c",
        "cp -an /workspace/backend-data-seed/. /workspace/backend/data/ 2>/dev/null || true; python backend/app/src/extract.py",
      ]
    volumes:
      - backend-data:/workspace/backend/data

volumes:
  backend-data:
